name: Build OpenWrt + Passwall2 for Google WiFi (Gale)

on:
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: "OpenWrt git tag/branch to build"
        required: true
        default: "v25.12.5"
      config_file:
        description: "Path (in this repo) to the .config seed file"
        required: true
        default: "config/google_wifi-passwall2.config"

permissions:
  contents: write

env:
  TZ: Asia/Tehran

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-distutils rsync swig unzip zlib1g-dev \
            file wget ccache libelf-dev jq

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.openwrt_tag }}" \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Add Passwall2 feeds
        working-directory: openwrt
        run: |
          sed -i '1i src-git passwall2 https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main' feeds.conf.default
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          cat feeds.conf.default

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p passwall_packages
          ./scripts/feeds install -a -p passwall2

      - name: Patch Passwall2 status page (Baidu -> Cloudflare)
        working-directory: openwrt
        run: |
          set -e
          # The connection-check logos in status.htm are embedded as inline
          # base64 data-URIs, NOT separate image files. The old "overwrite the
          # baidu.png file" approach found nothing to overwrite, so the logo
          # never changed. This Python script edits the base64 inline, scoped
          # to the Baidu block only (Google/GitHub logos are left untouched).
          STATUS_HTM=$(find feeds -type f -path "*view/passwall2/global/status.htm" | head -n1)
          if [ -z "$STATUS_HTM" ]; then
            echo "Could not locate status.htm, skipping Cloudflare logo patch."
            exit 0
          fi
          echo "Patching: $STATUS_HTM"
          python3 "$GITHUB_WORKSPACE/scripts/patch_cf_logo.py" "$STATUS_HTM"

      - name: Embed Iran geoip/geosite data + first-boot setup script
        working-directory: openwrt
        run: |
          set -e
          mkdir -p files/usr/share/v2ray
          mkdir -p files/etc/uci-defaults

          # Iranian geoip/geosite data (referenced by the Iran Bypass rule as
          # ext:geoip_IR.dat:ir / ext:geosite_IR.dat:ir).
          curl -L -o files/usr/share/v2ray/geoip_IR.dat \
            https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat
          curl -L -o files/usr/share/v2ray/geosite_IR.dat \
            https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat

          # First-boot script. Filename MUST sort AFTER Passwall2's own
          # "luci-passwall2" uci-defaults script (which loads the shunt node),
          # hence the "zzz-" prefix.
          cp "$GITHUB_WORKSPACE/overlay/etc-uci-defaults-zzz-passwall2-iran.sh" \
            files/etc/uci-defaults/zzz-passwall2-iran
          chmod +x files/etc/uci-defaults/zzz-passwall2-iran

          ls -la files/usr/share/v2ray files/etc/uci-defaults

      - name: Apply device + Passwall2 config seed
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/${{ github.event.inputs.config_file }}" .config
          make defconfig

      - name: Show resolved package list (sanity check)
        working-directory: openwrt
        run: |
          grep -i passwall .config || echo "WARNING: passwall not found in resolved .config"

      - name: Download package sources
        working-directory: openwrt
        run: make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s || make -j1 V=s

      - name: Strip broken Passwall feeds from the on-device feed list
        working-directory: openwrt
        run: |
          # Belt-and-suspenders: also scrub the feed list baked into the image,
          # in addition to the first-boot cleanup in zzz-passwall2-iran. These
          # two URLs are not hosted on downloads.openwrt.org and break apk update.
          set -e
          find bin/targets -type f \( -name "distfeeds.list" -o -name "distfeeds.conf" \) -print0 \
            | while IFS= read -r -d '' f; do
                sed -i -e '\#/passwall2/#d' -e '\#/passwall_packages/#d' "$f" || true
                echo "Scrubbed: $f"
              done
          echo "Done (missing files are fine on this target)."

      - name: Collect build output
        working-directory: openwrt
        run: |
          mkdir -p ../artifacts
          find bin/targets -type f \( -name "*factory*" -o -name "*sysupgrade*" -o -name "*.manifest" -o -name "sha256sums" \) -exec cp {} ../artifacts/ \;
          ls -la ../artifacts

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-google_wifi-passwall2
          path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gale-${{ github.event.inputs.openwrt_tag }}-${{ github.run_number }}
          name: "OpenWrt ${{ github.event.inputs.openwrt_tag }} + Passwall2 (Google WiFi / Gale)"
          body: |
            بیلد اختصاصی برای Google WiFi (Gale) - target: ipq40xx/chromium, device: google_wifi
            شامل luci-app-passwall2 و هسته‌های xray-core و sing-box.

            این نسخه شامل:
            - قانون شانت «Iran Bypass» (دامنه‌ها و آی‌پی‌های ایران) که به صورت پیش‌فرض Direct (بایپس) روی نود شانت فعال می‌شود.
            - جایگزینی لوگوی Baidu با لوگوی Cloudflare در صفحه وضعیت.
            - پاک‌سازی خودکار فیدهای خراب Passwall تا apk update بدون خطا کار کند.
          files: artifacts/*
