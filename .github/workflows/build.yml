name: Build OpenWrt + Passwall2 for Google WiFi (Gale)

on:
  workflow_dispatch:
    inputs:
      openwrt_tag:
        description: "OpenWrt git tag/branch to build"
        required: true
        default: "v25.12.5"
      config_file:
        description: "Path (in this repo) to the .config seed file"
        required: true
        default: "config/google_wifi-passwall2.config"

permissions:
  contents: write

env:
  TZ: Asia/Tehran

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools python3-distutils rsync swig unzip zlib1g-dev \
            file wget ccache libelf-dev jq librsvg2-bin imagemagick

      - name: Clone OpenWrt source
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.openwrt_tag }}" \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Add Passwall2 feeds
        working-directory: openwrt
        run: |
          sed -i '1i src-git passwall2 https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main' feeds.conf.default
          sed -i '1i src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main' feeds.conf.default
          cat feeds.conf.default

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p passwall_packages
          ./scripts/feeds install -a -p passwall2

      - name: Patch Passwall2 UI (Baidu -> Cloudflare)
        working-directory: openwrt
        run: |
          set -e
          PW2=$(find feeds -maxdepth 2 -type d -iname "passwall2" | head -n1)
          if [ -z "$PW2" ]; then
            echo "Could not locate the passwall2 feed directory, skipping UI patch."
            exit 0
          fi
          echo "Patching Passwall2 sources under: $PW2"

          # 1) Text: "Baidu" -> "Cloudflare" (label) and baidu.com -> cloudflare.com (ping target)
          grep -rlZ "Baidu" "$PW2" 2>/dev/null | xargs -0 -r sed -i 's/Baidu/Cloudflare/g'
          grep -rlZ "baidu\.com" "$PW2" 2>/dev/null | xargs -0 -r sed -i 's/baidu\.com/cloudflare.com/g'

          # 2) Icon: overwrite any "baidu.*" icon file in place, keeping its
          #    original filename/extension so existing code references still work.
          find "$PW2" -type f -iname "*baidu*" \
            \( -iname "*.png" -o -iname "*.svg" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.gif" -o -iname "*.webp" \) \
            -print0 | while IFS= read -r -d '' icon; do
              ext=$(echo "${icon##*.}" | tr '[:upper:]' '[:lower:]')
              case "$ext" in
                svg)
                  cp "$GITHUB_WORKSPACE/assets/cloudflare-icon.svg" "$icon"
                  ;;
                png)
                  rsvg-convert -w 64 -h 64 "$GITHUB_WORKSPACE/assets/cloudflare-icon.svg" -o "$icon"
                  ;;
                jpg|jpeg)
                  rsvg-convert -w 64 -h 64 "$GITHUB_WORKSPACE/assets/cloudflare-icon.svg" -o /tmp/cf-icon.png
                  convert /tmp/cf-icon.png "$icon"
                  ;;
                gif|webp)
                  rsvg-convert -w 64 -h 64 "$GITHUB_WORKSPACE/assets/cloudflare-icon.svg" -o /tmp/cf-icon.png
                  convert /tmp/cf-icon.png "$icon"
                  ;;
              esac
              echo "Replaced icon: $icon"
            done

      - name: Embed Iran geoip/geosite data + first-boot rule script
        working-directory: openwrt
        run: |
          set -e
          mkdir -p files/usr/share/v2ray
          mkdir -p files/etc/uci-defaults

          curl -L -o files/usr/share/v2ray/geoip_IR.dat \
            https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat
          curl -L -o files/usr/share/v2ray/geosite_IR.dat \
            https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat

          cp "$GITHUB_WORKSPACE/overlay/etc-uci-defaults-99-custom-passwall2.sh" \
            files/etc/uci-defaults/99-custom-passwall2
          chmod +x files/etc/uci-defaults/99-custom-passwall2

          ls -la files/usr/share/v2ray files/etc/uci-defaults

      - name: Apply device + Passwall2 config seed
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/${{ github.event.inputs.config_file }}" .config
          make defconfig

      - name: Show resolved package list (sanity check)
        working-directory: openwrt
        run: |
          grep -i passwall .config || echo "WARNING: passwall not found in resolved .config"

      - name: Download package sources
        working-directory: openwrt
        run: make download -j8

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s || make -j1 V=s

      - name: Collect build output
        working-directory: openwrt
        run: |
          mkdir -p ../artifacts
          find bin/targets -type f \( -name "*factory*" -o -name "*sysupgrade*" -o -name "*.manifest" -o -name "sha256sums" \) -exec cp {} ../artifacts/ \;
          ls -la ../artifacts

      - name: Upload build artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-google_wifi-passwall2
          path: artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gale-${{ github.event.inputs.openwrt_tag }}-${{ github.run_number }}
          name: "OpenWrt ${{ github.event.inputs.openwrt_tag }} + Passwall2 (Google WiFi / Gale)"
          body: |
            بیلد اختصاصی برای Google WiFi (Gale) - target: ipq40xx/chromium, device: google_wifi
            شامل luci-app-passwall2 و هسته‌های xray-core و sing-box.
          files: artifacts/*
